name: Edit release notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to edit, e.g. v1.0"
        required: true
      notes:
        description: "New release notes"
        required: true

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - name: Update release body
        run: gh release edit "${{ inputs.tag }}" -R "${{ github.repository }}" --notes "${{ inputs.notes }}"
        env:
          GH_TOKEN: ${{ github.token }}
