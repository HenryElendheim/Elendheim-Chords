name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. v1.0"
        required: true
      notes:
        description: "Release notes"
        required: false
        default: ""

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build APK
        run: ./gradlew testDebugUnitTest assembleDebug

      - name: Name APK after the release
        run: cp app/build/outputs/apk/debug/app-debug.apk "elendheim-chords-${{ env.VERSION }}.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: elendheim-chords-*.apk
          body: ${{ inputs.notes || '' }}
